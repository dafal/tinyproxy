# Pipeline runs on a schedule configured in GitLab UI:
# CI/CD → Schedules → every 15 minutes (or your preferred interval)
#
# Required CI/CD variables (GitLab UI → Settings → CI/CD → Variables):
#   DOCKER_HUB_USER   : your Docker Hub username
#   DOCKER_HUB_TOKEN  : your Docker Hub access token (masked)
#
# Optional CI/CD variable (set after first successful build to skip unchanged commits):
#   LAST_BUILT_SHA    : SHA of the last successfully built GitHub commit
#
# The pipeline clones the source from GitHub, builds the image rootlessly
# using BuildKit, and pushes to Docker Hub only when there are new commits.

stages:
  - build

variables:
  GITHUB_REPO: "https://github.com/dafal/tinyproxy.git"
  IMAGE_NAME: "dafal/tinyproxy"
  GIT_STRATEGY: none  # We clone manually from GitHub, not from GitLab

build-and-push:
  stage: build
  image:
    name: moby/buildkit:rootless
    entrypoint: [""]
  variables:
    DOCKER_CONFIG: "$CI_PROJECT_DIR/.docker"
    BUILDKITD_FLAGS: --oci-worker-no-process-sandbox
  before_script:
    # Install git (not present in the buildkit image)
    - apk add --no-cache git

    # Clone from GitHub
    - git clone "$GITHUB_REPO" repo

    # Skip build if nothing has changed since last run
    - CURRENT_SHA=$(git -C repo rev-parse HEAD)
    - echo "GitHub HEAD is $CURRENT_SHA"
    - |
      if [ -n "$LAST_BUILT_SHA" ] && [ "$LAST_BUILT_SHA" = "$CURRENT_SHA" ]; then
        echo "No new commits since last build ($LAST_BUILT_SHA). Skipping."
        exit 0
      fi

    # Configure Docker Hub authentication for BuildKit
    - mkdir -p "$DOCKER_CONFIG"
    - |
      cat > "$DOCKER_CONFIG/config.json" <<EOF
      {"auths":{"https://index.docker.io/v1/":{"username":"$DOCKER_HUB_USER","password":"$DOCKER_HUB_TOKEN"}}}
      EOF

  script:
    - SHORT_SHA=$(git -C repo rev-parse --short HEAD)
    - echo "Building $IMAGE_NAME:$SHORT_SHA ..."
    - |
      buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --local context=repo \
        --local dockerfile=repo \
        --opt filename=Dockerfile \
        --import-cache type=registry,ref=$IMAGE_NAME:buildcache \
        --export-cache type=registry,ref=$IMAGE_NAME:buildcache,mode=max \
        --output type=image,"name=$IMAGE_NAME:latest,$IMAGE_NAME:$SHORT_SHA",push=true

# Pipeline runs on a schedule configured in GitLab UI:
# CI/CD → Schedules → every 15 minutes (or your preferred interval)
#
# Required CI/CD variables (GitLab UI → Settings → CI/CD → Variables):
#   DOCKER_HUB_USER   : your Docker Hub username
#   DOCKER_HUB_TOKEN  : your Docker Hub access token (masked)
#
# The pipeline clones the source from GitHub, builds the image,
# and pushes to Docker Hub only when there are new commits.

stages:
  - build

variables:
  GITHUB_REPO: "https://github.com/dafal/tinyproxy.git"
  IMAGE_NAME: "dafal/tinyproxy"
  GIT_STRATEGY: none  # We clone manually from GitHub, not from GitLab

build-and-push:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    # Clone from GitHub
    - apk add --no-cache git
    - git clone "$GITHUB_REPO" repo
    - cd repo

    # Determine the current HEAD commit
    - CURRENT_SHA=$(git rev-parse HEAD)
    - echo "Current GitHub HEAD is $CURRENT_SHA"

    # Fetch the last built SHA stored as a CI variable (LAST_BUILT_SHA).
    # On first run, or if the variable is not set, always build.
    - |
      if [ -n "$LAST_BUILT_SHA" ] && [ "$LAST_BUILT_SHA" = "$CURRENT_SHA" ]; then
        echo "No new commits since last build ($LAST_BUILT_SHA). Skipping."
        exit 0
      fi

    # Build image — tag with latest and the short commit SHA
    - SHORT_SHA=$(echo "$CURRENT_SHA" | cut -c1-8)
    - echo "Building image for commit $SHORT_SHA ..."
    - docker build -t "$IMAGE_NAME:latest" -t "$IMAGE_NAME:$SHORT_SHA" .

    # Push to Docker Hub
    - echo "$DOCKER_HUB_TOKEN" | docker login -u "$DOCKER_HUB_USER" --password-stdin
    - docker push "$IMAGE_NAME:latest"
    - docker push "$IMAGE_NAME:$SHORT_SHA"
    - echo "Pushed $IMAGE_NAME:latest and $IMAGE_NAME:$SHORT_SHA"

  after_script:
    - docker logout || true
